[tool.ruff]
target-version = "py311"
line-length = 120
src = ["app", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]

[tool.mypy]
python_version = "3.11"
packages = ["app"]
strict = false
warn_return_any = false
warn_unused_ignores = true
ignore_missing_imports = true

[tool.ruff.lint.per-file-ignores]
"tests/conftest.py" = ["E402"]
"alembic/env.py" = ["E402", "I001"]

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true
